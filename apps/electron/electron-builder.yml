# Electron Builder Configuration
# https://www.electron.build/configuration/configuration

appId: com.zensend.app
productName: Zen Send
copyright: Copyright © 2026 Zen Send

# Disable ASAR to fix "Not allowed to load local resource" error
# When loading files from ASAR with crossorigin attributes, browsers block the request
asar: false

directories:
  output: release
  buildResources: build
files:
  - dist/**
  - package.json

# macOS Configuration
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  sign: null
  notarize: null

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

# Windows Configuration
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  verifyUpdateCodeSignature: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Zen Send
  uninstallDisplayName: Zen Send

# Linux Configuration
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Office
  icon: build/icon.png
  maintainer: Zen Send
  vendor: Zen Send
  synopsis: Cross-device content transfer
  description: Zen Send - Cross-platform clipboard, text, and file transfer tool
  desktop:
    entry:
      Name: Zen Send
      Comment: Cross-platform content transfer application
      Categories: Office;Productivity;

appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}

deb:
  artifactName: ${productName}-${version}-${arch}.${ext}

# GitHub Releases publish configuration
publish:
  provider: github
  owner: ximing
  repo: zen-send
  releaseType: release

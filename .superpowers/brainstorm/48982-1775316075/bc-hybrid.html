<h2>融合方案 B + C 的设计</h2>
<p class="subtitle">纯背景色 + 圆角为主体，微妙阴影 + hover 反馈强化交互</p>

<div class="mockup">
  <div class="mockup-header">融合效果预览</div>
  <div class="mockup-body">
    <div style="padding: 20px; background: #F7F5F2; font-size: 12px;">
      <!-- 卡片 -->
      <div style="background: #FFFFFF; border-radius: 16px; padding: 16px; margin-bottom: 12px;">
        <div style="font-weight: 600; margin-bottom: 12px; color: #2C2C2C;">设备列表</div>
        <div style="padding: 10px 12px; border-radius: 10px; background: #F5F5F5; margin-bottom: 6px;">MacBook Pro</div>
        <div style="padding: 10px 12px; border-radius: 10px; background: #F5F5F5;">iPhone 15</div>
      </div>
      <!-- 按钮组 -->
      <div style="display: flex; gap: 10px;">
        <button style="flex: 1; padding: 12px 16px; border-radius: 12px; background: #FFFFFF; color: #2C2C2C; font-weight: 500; border: none;">发送</button>
        <button style="flex: 1; padding: 12px 16px; border-radius: 12px; background: #2C2C2C; color: white; font-weight: 500; border: none;">接收</button>
      </div>
    </div>
  </div>
</div>

<div class="section"></div>

<h3>具体变化</h3>
<div class="pros-cons">
  <div class="pros">
    <h4>卡片组件</h4>
    <ul>
      <li>去掉边框，保留大圆角 (16px)</li>
      <li>背景色与页面形成对比</li>
      <li>列表项用背景色块而非分隔线</li>
    </ul>
  </div>
  <div class="cons">
    <h4>按钮</h4>
    <ul>
      <li>去掉边框，纯色填充</li>
      <li>hover 时轻微下沉 + 阴影加深</li>
      <li>次要按钮用浅色背景</li>
    </ul>
  </div>
</div>

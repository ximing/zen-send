name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - main
      - develop
    tags:
      - 'v*.*.*'
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches:
      - master
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (default: branch name)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.ref_name }}-${{ github.sha }},enable=${{ !startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=stable,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Output image tags
        if: github.event_name != 'pull_request'
        run: |
          echo "## Docker Image Built Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Command:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Run Command:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 3110:3110 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e JWT_ACCESS_SECRET=your-access-secret \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e JWT_REFRESH_SECRET=your-refresh-secret \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e S3_REGION=us-east-1 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e S3_ACCESS_KEY_ID=your-key \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e S3_SECRET_ACCESS_KEY=your-secret \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e S3_BUCKET=zen-send-transfers \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e MYSQL_HOST=mysql \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e MYSQL_USER=zen-send \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e MYSQL_PASSWORD=password \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e MYSQL_DATABASE=zen-send \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

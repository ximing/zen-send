name: Build Electron Client

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  NODE_VERSION: 20
  PNPM_VERSION: 10.22.0
  VITE_DEV_SERVER_URL: ${{ vars.VITE_DEV_SERVER_URL }}

jobs:
  # Build packages first
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          # Clean incremental build cache for fresh builds
          find packages -name "tsconfig.tsbuildinfo" -delete
          find packages -name "*.tsbuildinfo" -delete
          rm -rf packages/*/dist
          pnpm --filter "@zen-send/dto" build
          pnpm --filter "@zen-send/logger" build
          pnpm --filter "@zen-send/shared" build

      - name: Upload packages artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-dist
          path: |
            packages/*/dist/**
            packages/*/package.json
          retention-days: 1

  # Typecheck and lint electron
  quality-checks:
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download packages artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: packages

      - name: Type check electron
        run: pnpm --filter @zen-send/electron typecheck

      - name: Lint electron
        run: pnpm --filter @zen-send/electron lint

  # macOS Intel (x64) build
  build-macos-x64:
    runs-on: macos-14
    needs: [build-packages, quality-checks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Download packages artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: packages

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules for x64
        run: cd apps/electron && pnpm exec electron-builder install-app-deps --arch=x64

      - name: Build Electron
        run: pnpm --filter @zen-send/electron build

      - name: Build macOS x64
        run: |
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK
            unset CSC_KEY_PASSWORD
          fi
          pnpm --filter @zen-send/electron run dist:mac -- --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-artifacts
          path: |
            apps/electron/release/*-x64.dmg
            apps/electron/release/*-x64.zip
            apps/electron/release/latest-mac.yml
          if-no-files-found: warn

  # macOS Apple Silicon (arm64) build
  build-macos-arm64:
    runs-on: macos-latest
    needs: [build-packages, quality-checks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          architecture: arm64

      - name: Download packages artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: packages

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules for arm64
        run: cd apps/electron && pnpm exec electron-builder install-app-deps --arch=arm64

      - name: Build Electron
        run: pnpm --filter @zen-send/electron build

      - name: Build macOS arm64
        run: |
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK
            unset CSC_KEY_PASSWORD
          fi
          pnpm --filter @zen-send/electron run dist:mac -- --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-artifacts
          path: |
            apps/electron/release/*-arm64.dmg
            apps/electron/release/*-arm64.zip
            apps/electron/release/latest-mac.yml
          if-no-files-found: warn

  # Windows x64 build
  build-windows:
    runs-on: windows-latest
    needs: [build-packages, quality-checks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download packages artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: packages

      - name: Build Electron
        run: pnpm --filter @zen-send/electron build

      - name: Build Windows
        run: pnpm --filter @zen-send/electron run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            apps/electron/release/*.exe
            apps/electron/release/*.msi
            apps/electron/release/latest.yml
          if-no-files-found: warn

  # Linux x64 build
  build-linux:
    runs-on: ubuntu-latest
    needs: [build-packages, quality-checks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download packages artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: packages

      - name: Build Electron
        run: pnpm --filter @zen-send/electron build

      - name: Build Linux
        run: pnpm --filter @zen-send/electron run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            apps/electron/release/*.AppImage
            apps/electron/release/*.deb
            apps/electron/release/latest-linux.yml
          if-no-files-found: warn

  # Create GitHub Release for master branch
  release:
    needs: [build-macos-x64, build-macos-arm64, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: 🏗 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-artifacts'
          merge-multiple: true

      - name: 📋 List artifacts
        run: ls -la artifacts/

      - name: 📋 Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./apps/electron/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-pc-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --title "Release $TAG (Electron)" \
            --notes "🖥️ Electron Desktop App built via GitHub Actions

          ## Downloads
          - **macOS Intel**: \`Zen-Send-x64.dmg\` or \`Zen-Send-x64.zip\`
          - **macOS Apple Silicon**: \`Zen-Send-arm64.dmg\` or \`Zen-Send-arm64.zip\`
          - **Windows**: \`Zen-Send-Setup.exe\` or \`Zen-Send-Setup.msi\`
          - **Linux**: \`Zen-Send-x86_64.AppImage\` or \`Zen-Send_amd64.deb\`" \
            artifacts/*

      - name: 📦 Build Summary
        if: always()
        run: |
          echo "✅ Build completed!"
          echo "🏷️  Tag: ${{ steps.version.outputs.tag }}"
          echo "📦 Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"

  # Build status notification
  notify:
    needs: [build-macos-x64, build-macos-arm64, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-macos-x64.result }}" == "failure" ] || \
             [ "${{ needs.build-macos-arm64.result }}" == "failure" ] || \
             [ "${{ needs.build-windows.result }}" == "failure" ] || \
             [ "${{ needs.build-linux.result }}" == "failure" ]; then
            echo "::error::One or more builds failed!"
            exit 1
          else
            echo "All builds completed successfully!"
          fi
